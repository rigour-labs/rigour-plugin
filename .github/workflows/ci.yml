name: Plugin CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-plugin:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Validate plugin metadata
        run: npm run validate:metadata
